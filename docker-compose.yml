name: service-hub

x-service-env: &service-env
  INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret}
  IDENTITY_SERVICE_URL: http://identity-service:4001
  PROVIDER_SERVICE_URL: http://provider-service:4002
  REVIEW_SERVICE_URL: http://review-service:4003
  JOB_SERVICE_URL: http://job-service:4004
  NOTIFICATION_SERVICE_URL: http://notification-service:4005
  MEDIA_SERVICE_URL: http://media-service:4006
  CHAT_SERVICE_URL: http://chat-service:4007
  SEARCH_SERVICE_URL: http://search-service:4008
  TRUST_SAFETY_SERVICE_URL: http://trust-safety-service:4009
  # Error capture (#34): the Sentry-compatible DSN each service reports crashes
  # to (GlitchTip). Unset by default → src/lib/errors.ts is a pure no-op (no SDK
  # init, no network), so dev works exactly as before. To try it locally, start
  # the `errors` profile below, create a project in the GlitchTip UI, and put
  # its DSN in your root .env as SENTRY_DSN.
  SENTRY_DSN: ${SENTRY_DSN:-}
  # Distributed tracing (#668, tracing follow-up — COMPLETES #668). OFF by
  # default so a plain `docker compose up` — and CI's e2e/playwright boot —
  # never load the OTel bootstrap: both vars are empty, so NODE_OPTIONS carries
  # no `--require` and src/tracing.ts is never loaded. To trace locally, start
  # the `tracing` profile below (tempo + otel-collector) and set BOTH in your
  # root .env, then recreate the services:
  #   OTEL_NODE_OPTIONS=--require ./dist/tracing.js
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
  # Belt and braces: tracing.ts is ALSO a no-op whenever the endpoint is unset,
  # so even a stray NODE_OPTIONS can't stand up an exporter on its own.
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  NODE_OPTIONS: ${OTEL_NODE_OPTIONS:-}

# GlitchTip (#34) shared env for its web + worker + migrate containers. Points
# at GlitchTip's OWN Postgres + Redis (never the app cluster). GlitchTip is
# behind the opt-in `errors` profile, so a plain `docker compose up` never
# starts it; to use it locally set GLITCHTIP_SECRET_KEY (any value) in the root
# .env before `docker compose --profile errors up`. No SECRET_KEY literal is
# committed (public repo — secret scanners reject SECRET_KEY defaults); prod
# requires real secrets (docker-compose.prod.yml).
x-glitchtip-env: &glitchtip-env
  DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD:-glitchtip}@glitchtip-postgres:5432/glitchtip
  SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-}
  REDIS_URL: redis://glitchtip-redis:6379/0
  PORT: "8000"
  GLITCHTIP_DOMAIN: http://localhost:8000
  EMAIL_URL: consolemail://
  DEFAULT_FROM_EMAIL: glitchtip@localhost
  CELERY_WORKER_AUTOSCALE: "1,3"

services:
  postgres:
    # PostGIS-enabled Postgres 16 (search & discovery RFC): same PG16 data-dir
    # format as the previous postgres:16-alpine — the pgdata volume mounts
    # unchanged; the image only adds the extension packages search_db needs
    # (CREATE EXTENSION postgis requires them present in the image).
    image: postgis/postgis:16-3.5-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # 5433 on the host: many dev machines already run a local Postgres on 5432.
      # Loopback-bound (#387) — like every service port below (4000-4009), so on
      # shared wifi nobody else can reach Postgres (well-known dev password) or
      # hit a service directly with the dev internal secret and forged x-user-*
      # headers. Only web (:3000) stays LAN-reachable, for phone testing.
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      # Probe over TCP (-h 127.0.0.1), NOT the default local socket: the postgres
      # image runs its multi-DB init against a temporary socket-only server
      # (listen_addresses='') before restarting the real TCP listener. A socket
      # probe reports healthy during that window, so dependents get released early
      # and their `prisma migrate deploy` hits P1001 over TCP (flaky e2e boot, #686).
      # A TCP probe only passes once init is done and the real server accepts
      # connections the way the services actually connect.
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 15s

  # PgBouncer transaction pooler (#674): every DB service keeps its own Prisma
  # connection pool, so pool x replicas would blow past Postgres's
  # max_connections. The pooler collapses those onto a small set of shared
  # server connections. Services send RUNTIME queries here (DATABASE_URL, port
  # 6432, ?pgbouncer=true); migrations still hit Postgres directly (DIRECT_URL)
  # because a transaction pooler can't carry migrate's advisory locks/prepared
  # statements. Config is the mounted deploy/pgbouncer/pgbouncer.ini; the image
  # entrypoint generates userlist.txt from the DATABASE_URL below.
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    environment:
      # Seeds userlist.txt with the dev superuser (single role for every db here;
      # prod passes all seven per-service roles via DATABASE_URLS). scram-sha-256
      # makes the entrypoint store the plaintext password, which lets PgBouncer
      # both authenticate the client and SCRAM-auth onward to Postgres.
      AUTH_TYPE: scram-sha-256
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/identity_db
    volumes:
      - ./deploy/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    ports:
      # Loopback-bound like every other dev port, for psql/debugging into the pooler.
      - "127.0.0.1:6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  identity-service:
    build: ./services/identity-service
    environment:
      <<: *service-env
      PORT: 4001
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/identity_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/identity_db
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-secret}
      # Shared session-revocation list (#374): identity publishes each
      # sessionVersion bump here so the gateway can enforce revocations without
      # calling identity. Unset → publishing is a no-op (gateway falls back to
      # its identity lookup).
      REDIS_URL: redis://redis:6379
      # Social login (#398) — optional; unset → "Continue with Google" disabled.
      # For the Docker path, put these in the repo-root .env (compose reads that
      # for substitution); the host path (dev-all.sh) reads the service .env.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      # Registration bot protection (#633) — optional; unset → verification is
      # skipped (registration behaves as before).
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    ports:
      - "127.0.0.1:4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: &node-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://localhost:$$PORT/healthz > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  provider-service:
    build: ./services/provider-service
    environment:
      <<: *service-env
      PORT: 4002
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/provider_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/provider_db
      # Uploads now go through media-service; no local upload volume here.
    ports:
      - "127.0.0.1:4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      media-service:
        condition: service_healthy
    healthcheck: *node-healthcheck

  review-service:
    build: ./services/review-service
    environment:
      <<: *service-env
      PORT: 4003
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/review_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/review_db
      # Uploads now go through media-service; no local upload volume here.
    ports:
      - "127.0.0.1:4003:4003"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      media-service:
        condition: service_healthy
    healthcheck: *node-healthcheck

  job-service:
    build: ./services/job-service
    environment:
      <<: *service-env
      PORT: 4004
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/job_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/job_db
    ports:
      - "127.0.0.1:4004:4004"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck: *node-healthcheck

  notification-service:
    build: ./services/notification-service
    environment:
      <<: *service-env
      PORT: 4005
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/notification_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/notification_db
      # Email delivery queue (BRPOPLPUSH + retries); unset → degraded
      # one-attempt direct sends (in-app notifications unaffected).
      REDIS_URL: redis://redis:6379
      # Dev email preview (#673): SMTP takes precedence over Resend in email.ts,
      # so by default every EN/SI email is captured in the Mailpit inbox
      # (http://localhost:8025) instead of hitting Resend or the console. Set
      # SMTP_URL= (empty) in your root .env to restore the Resend/console path.
      SMTP_URL: ${SMTP_URL:-smtp://mailpit:1025}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    ports:
      - "127.0.0.1:4005:4005"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *node-healthcheck

  # Mailpit (#673) — DEV-ONLY fake SMTP server + web UI for previewing the EN/SI
  # emails notification-service sends. notification-service points SMTP_URL here
  # by default (above), so every verify / password-reset / marketplace email is
  # captured in this inbox instead of hitting Resend or the console fallback —
  # open it at http://localhost:8025. NEVER added to docker-compose.prod.yml.
  # Both host ports are loopback-bound (#387) like every other dev port. No
  # volume: the inbox is in-memory, so each run starts empty (what you want in
  # dev). Nothing critical depends_on this — if Mailpit is down, sends just
  # retry via the notify:email queue; the app still boots.
  mailpit:
    image: axllent/mailpit:v1.22
    environment:
      # Accept mail from notification-service with no auth / no TLS (dev only).
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "127.0.0.1:8025:8025" # web UI (inbox)
      - "127.0.0.1:1025:1025" # SMTP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/readyz > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  media-service:
    build: ./services/media-service
    environment:
      <<: *service-env
      PORT: 4006
      MEDIA_DIR: /app/data
      # Cloudflare R2 (S3-compatible) — takes precedence over local disk when set.
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
    ports:
      - "127.0.0.1:4006:4006"
    volumes:
      # The callers' original upload volumes, remounted under per-namespace
      # dirs so existing files and their URLs keep resolving with no migration.
      - provider_uploads:/app/data/provider
      - review_uploads:/app/data/review
    healthcheck: *node-healthcheck

  chat-service:
    build: ./services/chat-service
    environment:
      <<: *service-env
      PORT: 4007
      GATEWAY_URL: http://api-gateway:4000
      # Holds the LLM credential (isolated from the web runtime); unset → 503.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "127.0.0.1:4007:4007"
    healthcheck: *node-healthcheck

  search-service:
    build: ./services/search-service
    environment:
      <<: *service-env
      PORT: 4008
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/search_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/search_db
    ports:
      - "127.0.0.1:4008:4008"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck: *node-healthcheck

  # Trust & safety extraction, phase 1 (docs/rfcs/trust-safety-service.md):
  # unified reports + moderation audit store. DARK LAUNCH — the gateway does
  # not route to it yet; deployed so the cutover release is a routing flip.
  # :4008 is reserved for search-service (Stage-2 Track 1), so this takes :4009.
  trust-safety-service:
    build: ./services/trust-safety-service
    environment:
      <<: *service-env
      PORT: 4009
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://postgres:postgres@pgbouncer:6432/trust_safety_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/trust_safety_db
    ports:
      - "127.0.0.1:4009:4009"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck: *node-healthcheck

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api-gateway:
    build: ./services/api-gateway
    environment:
      <<: *service-env
      PORT: 4000
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-secret}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      # Shared rate-limit window across gateway instances; unset falls back
      # to the per-instance in-memory store.
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      redis:
        condition: service_healthy
      media-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      provider-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      trust-safety-service:
        condition: service_healthy
    healthcheck: *node-healthcheck

  web:
    build:
      context: .
    environment:
      # Read at request time by src/proxy.ts (and by server-side fetches) —
      # not baked into the image, so it can change without a rebuild.
      GATEWAY_URL: http://api-gateway:4000
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-secret}
      NEXT_PUBLIC_SITE_URL: ${WEB_ORIGIN:-http://localhost:3000}
      # Registration bot protection (#633) — optional public site key; unset →
      # the signup forms render no widget.
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      # The web app proxies /agent/chat to chat-service (which holds the LLM
      # key); it needs the URL + internal secret to reach that internal service.
      CHAT_SERVICE_URL: http://chat-service:4007
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret}
      # Session-revocation check for page gating (src/lib/session-version.ts) —
      # reaches identity directly with the internal secret; fails open if unset.
      IDENTITY_SERVICE_URL: http://identity-service:4001
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
      chat-service:
        condition: service_healthy

  # Observability (#668). Prometheus scrapes every service's /metrics (see
  # deploy/observability/prometheus.yml); Grafana Alloy tails every container's
  # stdout, parses the JSON log lines, and ships them to Loki. Grafana
  # auto-provisions Prometheus + Loki datasources and starter RED + logs
  # dashboards from deploy/observability/. Every host port is loopback-bound
  # (#387) like the other dev ports — reach Grafana at http://localhost:3001
  # (admin / ${GRAFANA_ADMIN_PASSWORD:-admin}). Error capture (self-hosted
  # GlitchTip, #34) ships below behind the `errors` profile; distributed tracing
  # (OTel/Tempo) is the remaining #668 follow-up.
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  # Infra exporters (#746) — host, Postgres and Redis metrics for Prometheus
  # (scrape jobs in deploy/observability/prometheus.yml), matching prod so the
  # scrape config and alert rules exercise the same targets in dev/CI.
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.9.1
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|run)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      # Dev superuser (postgres/postgres); cluster-wide metrics from the default DB.
      DATA_SOURCE_NAME: postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.69.0
    environment:
      # Dev Redis has no requirepass.
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Alerting webhook (#746): interpolated by the provisioned contact point
      # (deploy/observability/grafana/provisioning/alerting/). Placeholder in dev
      # so provisioning loads and the rules are visible in the local Grafana.
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-http://localhost:9099/alerts-unconfigured}
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      # Grafana serves on 3000 in-container; host 3000 is the web app, so map 3001.
      - "127.0.0.1:3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  # Loki — the log store. Single-binary, filesystem-backed (see
  # deploy/observability/loki/loki-config.yaml). Alloy ships parsed JSON logs
  # here; Grafana queries it as a datasource.
  loki:
    image: grafana/loki:3.5.1
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./deploy/observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15

  # Docker socket proxy (#744) — the ONLY container that mounts the real
  # /var/run/docker.sock. Fronts the Docker API with an HAProxy ACL layer and
  # exposes a read-only GET subset over TCP :2375; alloy talks to this instead of
  # the raw socket. POST=0 blocks all writes. Mirrors the prod posture so the
  # shared config.alloy works unchanged in both files.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      POST: 0
      CONTAINERS: 1
      EVENTS: 1
      PING: 1
      VERSION: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Grafana Alloy — the log shipper. Discovers every container via the Docker
  # API and tails stdout, parses the JSON, and pushes to Loki (see
  # deploy/observability/alloy/config.alloy). Its own UI is on 12345.
  #
  # Socket access (#744): Alloy reaches the Docker API through the read-only
  # docker-socket-proxy (below), NOT a raw /var/run/docker.sock bind — matching
  # prod, where a raw read-only socket bind is still root-equivalent if Alloy is
  # compromised (connect() bypasses the RO inode check). Same config.alloy in
  # both files, pointing at tcp://docker-socket-proxy:2375.
  alloy:
    image: grafana/alloy:v1.10.0
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./deploy/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      - "127.0.0.1:12345:12345"
    depends_on:
      loki:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    # No healthcheck: the alloy image has no reliable in-container HTTP client
    # for a `/-/ready` probe (wget/curl absent), so a CMD-SHELL check is always
    # "unhealthy" and stalls `docker compose up --wait`. Alloy is a fire-and-forget
    # log tailer — nothing depends on it being healthy — so `--wait` treating it
    # as ready once running is correct.

  # Distributed tracing (#668, tracing follow-up — COMPLETES #668). Grafana Tempo
  # stores spans; the OpenTelemetry Collector receives OTLP from the services and
  # forwards them to Tempo. BOTH sit behind the opt-in `tracing` profile — like
  # GlitchTip's `errors` profile — so a plain `docker compose up` (and CI's
  # e2e/playwright boot) NEVER start them and the default stack stays light.
  # Grafana's Tempo datasource is always provisioned; it just shows no data
  # until this profile is up. Host ports are loopback-bound (#387) like the rest.
  #
  # Enable locally: set OTEL_NODE_OPTIONS + OTEL_EXPORTER_OTLP_ENDPOINT in the
  # root .env (see x-service-env above), then
  # `docker compose --profile tracing up -d --build` and open Grafana Explore →
  # Tempo (http://localhost:3001). See docs/OPERATIONS.md → Observability.
  tempo:
    profiles: ["tracing"]
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./deploy/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200" # Tempo query API (Grafana reaches it in-network)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 20s

  otel-collector:
    profiles: ["tracing"]
    image: otel/opentelemetry-collector:0.120.0
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ./deploy/observability/otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "127.0.0.1:4318:4318" # OTLP/HTTP — what the services export to
      - "127.0.0.1:4317:4317" # OTLP/gRPC
    depends_on:
      tempo:
        condition: service_healthy
    # No healthcheck: the collector image is distroless (no wget/curl for a
    # CMD-SHELL probe, same as alloy). Nothing gates on it being healthy —
    # services export best-effort — so `--wait` treating it as ready once
    # running is correct.

  # Feature flags (#675) — self-hosted Unleash + its OWN Postgres (never the app
  # cluster). Behind the `flags` profile so a plain `docker compose up` (and the
  # CI e2e) DON'T start it: the web app degrades gracefully with the flag env
  # unset, so dev works exactly as today. Opt in for local flag work with
  # `docker compose --profile flags up -d unleash`, open the admin UI at
  # http://localhost:4242 (default login admin / unleash4all), create a flag +
  # a Frontend API token, then run the web app with UNLEASH_URL +
  # UNLEASH_FRONTEND_TOKEN set (see docs/OPERATIONS.md → Feature flags).
  unleash-db:
    profiles: ["flags"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash
      POSTGRES_DB: unleash
    ports:
      # Loopback-bound (#387) like every other dev port; 5433 is the app cluster.
      - "127.0.0.1:5434:5432"
    volumes:
      - unleash_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  unleash:
    profiles: ["flags"]
    image: unleashorg/unleash-server:7.6
    environment:
      DATABASE_URL: postgres://unleash:unleash@unleash-db:5432/unleash
      DATABASE_SSL: "false"
      # No phone-home version check → the container needs no internet.
      CHECK_VERSION: "false"
      # Optionally seed a Frontend API token from the environment so a fresh dev
      # instance is usable without a manual admin step. No token literal lives in
      # the tree (the repo is public, #675) — empty by default; set
      # UNLEASH_FRONTEND_TOKEN in your local .env (same value you give the web
      # app) to pre-seed it, OR just create a token in the admin UI. Mirrors the
      # prod side. See docs/OPERATIONS.md → Feature flags.
      INIT_FRONTEND_API_TOKENS: ${UNLEASH_FRONTEND_TOKEN:-}
    ports:
      # Loopback-bound admin UI (#387) — never LAN/internet-reachable.
      - "127.0.0.1:4242:4242"
    depends_on:
      unleash-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4242/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  # Error capture (#34) — self-hosted GlitchTip (Sentry-compatible ingest,
  # chosen for data residency / PDPA). Behind the `errors` profile so a plain
  # `docker compose up` (and the CI e2e) DON'T start this heavy stack: services
  # degrade gracefully with SENTRY_DSN unset, so dev works exactly as today.
  # Opt in with `docker compose --profile errors up -d glitchtip-web`, open the
  # UI at http://localhost:8000, create an account + a project, copy its DSN,
  # then run the stack with SENTRY_DSN set (see docs/OPERATIONS.md → Error
  # capture). Its OWN Postgres + Redis — never the app cluster.
  glitchtip-postgres:
    profiles: ["errors"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:-glitchtip}
      POSTGRES_DB: glitchtip
    ports:
      # Loopback-bound (#387) like every other dev port; 5433 is the app
      # cluster, 5434 is Unleash's DB.
      - "127.0.0.1:5435:5432"
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  glitchtip-redis:
    profiles: ["errors"]
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot schema migrate — web/worker wait for it to finish (the GlitchTip
  # image doesn't auto-migrate). Exits 0; `restart: "no"` so it doesn't loop.
  glitchtip-migrate:
    profiles: ["errors"]
    image: glitchtip/glitchtip:6.2.0
    command: ["./manage.py", "migrate"]
    restart: "no"
    environment:
      <<: *glitchtip-env
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy

  glitchtip-web:
    profiles: ["errors"]
    image: glitchtip/glitchtip:6.2.0
    environment:
      <<: *glitchtip-env
    ports:
      # Loopback-bound (#387): the ingest API + UI. Services report to it over
      # the compose network; an operator reaches the UI at http://localhost:8000.
      - "127.0.0.1:8000:8000"
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
      glitchtip-migrate:
        condition: service_completed_successfully
    healthcheck:
      # The image ships /code/healthcheck.py (GET /_health/); no curl/wget in it.
      test: ["CMD", "python", "healthcheck.py"]
      interval: 10s
      timeout: 6s
      retries: 10
      start_period: 40s

  glitchtip-worker:
    profiles: ["errors"]
    image: glitchtip/glitchtip:6.2.0
    command: ["./bin/run-celery-with-beat.sh"]
    environment:
      <<: *glitchtip-env
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
      glitchtip-migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  provider_uploads:
  review_uploads:
  prometheus_data:
  grafana_data:
  loki_data:
  alloy_data:
  tempo_data:
  unleash_db_data:
  glitchtip_db_data:
