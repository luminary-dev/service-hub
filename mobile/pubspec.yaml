name: baas_mobile
description: "Baas.lk customer app — bilingual services marketplace for Sri Lanka."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.10.0
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  geolocator: ^14.0.3
  go_router: ^17.3.0
  image_picker: ^1.2.3
  intl: ^0.20.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
