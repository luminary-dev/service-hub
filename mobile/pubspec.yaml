name: baas_mobile
description: "Baas.lk customer app — bilingual services marketplace for Sri Lanka."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.10.0
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.3.0
  flutter_web_auth_2: ^5.0.3
  font_awesome_flutter: ^11.0.0
  geolocator: ^14.0.3
  go_router: ^17.3.0
  image_picker: ^1.2.3
  intl: ^0.20.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  # Self-hosted fonts, exactly like the web (next/font). IBM Plex Sans for
  # Latin, Noto Sans Sinhala for Sinhala, IBM Plex Mono for the technical
  # micro-labels — matching src/app/globals.css so the two surfaces are
  # visually identical and render offline (no runtime fetch/fallback).
  fonts:
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
    - family: Noto Sans Sinhala
      fonts:
        - asset: assets/fonts/NotoSansSinhala.ttf
