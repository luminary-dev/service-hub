name: service-hub-prod

# Production stack. Pulls pre-built images from GHCR (published by
# .github/workflows/deploy.yml on push to prod) instead of building locally.
# Only Caddy is published to the host (80/443, auto-TLS); every service and the
# datastores stay on internal networks, split edge/backend/egress (#387 — see
# the `networks:` block at the bottom). Required secrets use ${VAR:?} so the
# stack refuses to start rather than fall back to a dev default — this mirrors
# the AUTH_SECRET / INTERNAL_API_SECRET guards in the app.
#
# Usage on the server:
#   cp .env.prod.example .env && $EDITOR .env      # fill in the secrets
#   IMAGE_TAG=<sha-or-prod> docker compose -f docker-compose.prod.yml up -d

x-service-env: &service-env
  NODE_ENV: production
  INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
  IDENTITY_SERVICE_URL: http://identity-service:4001
  PROVIDER_SERVICE_URL: http://provider-service:4002
  REVIEW_SERVICE_URL: http://review-service:4003
  JOB_SERVICE_URL: http://job-service:4004
  NOTIFICATION_SERVICE_URL: http://notification-service:4005
  MEDIA_SERVICE_URL: http://media-service:4006
  CHAT_SERVICE_URL: http://chat-service:4007
  SEARCH_SERVICE_URL: http://search-service:4008
  TRUST_SAFETY_SERVICE_URL: http://trust-safety-service:4009

# Probe failures during start_period don't count against the retry budget
# (#568) — without it a boot longer than ~100s marked the container unhealthy
# and tripped the deploy gate into rollback. A success ends the grace early.
x-node-healthcheck: &node-healthcheck
  test: ["CMD-SHELL", "wget -qO- http://localhost:$$PORT/healthz > /dev/null || exit 1"]
  interval: 10s
  timeout: 3s
  retries: 10
  start_period: 30s

# DB-owning services run `prisma migrate deploy` before listening
# (start:migrate), so a slow migration needs more headroom (#568).
x-db-healthcheck: &db-healthcheck
  <<: *node-healthcheck
  start_period: 120s

x-restart: &restart
  restart: unless-stopped

# Log rotation (#240): cap json-file log growth so a chatty or crash-looping
# service can't fill the single VPS's disk. Merged into every service.
x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# Container runtime hardening (#526): defense-in-depth merged into every
# container. `no-new-privileges` stops a process ever gaining privileges (e.g.
# via a setuid binary); `cap_drop: ALL` strips every Linux capability — the Node
# services bind ports >1024 as the non-root `node` user and need none.
# postgres/redis/caddy add back only the capabilities their entrypoints require
# (see `cap_add` on those blocks). `read_only` rootfs is applied per-service
# below, only where every writable path is known and backed by a tmpfs/volume.
x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  postgres:
    # Base image pinned by digest (#238); Dependabot's docker ecosystem bumps
    # the tag comment + digest together.
    # PostGIS-enabled Postgres 16 (search & discovery RFC): same PG16 data-dir
    # format as the previous postgres:16-alpine, so the existing pgdata volume
    # mounts unchanged — the image only adds the extension packages. PostGIS
    # itself exists only inside search_db, so rolling the image back stays
    # possible until search-service ships. Rollout order for an existing
    # volume: see docs/DEPLOYMENT.md (deploy/migrate-db-roles.sh).
    # dependabot: postgis/postgis:16-3.5-alpine
    image: postgis/postgis:16-3.5-alpine@sha256:becb8d49a20a2c1fcce1b154e853e1ea1a19cd5de99310852888b998694ec2ea
    mem_limit: 1g
    <<: [*restart, *logging, *hardening]
    # The entrypoint starts as root to chown/chmod the data dir and the socket
    # dir, then drops to the `postgres` user via su-exec — so with cap_drop: ALL
    # it needs these back or it can't initialise (verified: without them the boot
    # fails with "chown: /var/lib/postgresql/data: Operation not permitted").
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Per-service role passwords (#387): consumed by deploy/postgres-init.sh
      # on a FRESH data directory, and by deploy/migrate-db-roles.sh (which
      # execs into this container) on an existing one. Generate with
      # `openssl rand -hex 32` — they are interpolated into the DATABASE_URLs
      # below, so they must stay URL-safe (hex is).
      IDENTITY_DB_PASSWORD: ${IDENTITY_DB_PASSWORD:?IDENTITY_DB_PASSWORD is required}
      PROVIDER_DB_PASSWORD: ${PROVIDER_DB_PASSWORD:?PROVIDER_DB_PASSWORD is required}
      REVIEW_DB_PASSWORD: ${REVIEW_DB_PASSWORD:?REVIEW_DB_PASSWORD is required}
      JOB_DB_PASSWORD: ${JOB_DB_PASSWORD:?JOB_DB_PASSWORD is required}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?NOTIFICATION_DB_PASSWORD is required}
      SEARCH_DB_PASSWORD: ${SEARCH_DB_PASSWORD:?SEARCH_DB_PASSWORD is required}
      TRUST_SAFETY_DB_PASSWORD: ${TRUST_SAFETY_DB_PASSWORD:?TRUST_SAFETY_DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Least-privilege bootstrap (#387): unlike the dev scripts/init-db.sql
      # (plain CREATE DATABASE, everything owned by the superuser), prod
      # creates one LOGIN role per service database, owning only that database,
      # with CONNECT revoked from PUBLIC. Runs on initdb only — an existing
      # data volume is migrated with deploy/migrate-db-roles.sh instead.
      - ./deploy/postgres-init.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks: [backend]
    healthcheck:
      # Probe over TCP (-h 127.0.0.1), NOT the default local socket: the postgres
      # image runs its multi-DB init against a temporary socket-only server
      # (listen_addresses='') before restarting the real TCP listener. A socket
      # probe reports healthy during that window, so dependents get released early
      # and their `prisma migrate deploy` hits P1001 over TCP (#686). A TCP probe
      # only passes once the real server accepts connections the way services do.
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  redis:
    # dependabot: redis:7-alpine
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    mem_limit: 256m
    <<: [*restart, *logging, *hardening]
    # requirepass (#387): Redis holds the session-revocation list and the
    # rate-limit windows — unauthenticated, any compromised container on the
    # same network could FLUSHALL them (undoing every revocation and resetting
    # the limits). Passing --requirepass as a flag keeps the image's default
    # config (including the RDB snapshot save points) and only adds auth.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    environment:
      # Auths the healthcheck's redis-cli without the password appearing in
      # the probe's command line.
      REDISCLI_AUTH: ${REDIS_PASSWORD:?}
    # Redis holds the session-revocation list (#374) as well as rate-limit
    # windows, so its default RDB snapshot in /data must survive container
    # recreation (#571) — otherwise every `revocation:<userId>` key is wiped by
    # any image bump or compose change.
    volumes:
      - redis_data:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  # PgBouncer transaction pooler (#674). Each DB service runs its own Prisma
  # connection pool and is replicated, so pool x replicas would exhaust
  # Postgres's max_connections. The pooler multiplexes those onto a small shared
  # set of server connections. Services route RUNTIME queries here (DATABASE_URL,
  # :6432, ?pgbouncer=true) and MIGRATIONS straight to Postgres (DIRECT_URL) —
  # a transaction pooler can't carry migrate's advisory locks/prepared
  # statements. Config is the mounted deploy/pgbouncer/pgbouncer.ini; the
  # entrypoint builds userlist.txt from DATABASE_URLS below.
  pgbouncer:
    # dependabot: edoburu/pgbouncer:v1.25.2-p0
    image: edoburu/pgbouncer:v1.25.2-p0@sha256:7d7a27d9e90985cab5cf42256f5c13a3120baa4b055b69df37beb272b89b2340
    mem_limit: 128m
    <<: [*restart, *logging, *hardening]
    # Not read_only: the entrypoint writes the generated userlist.txt into
    # /etc/pgbouncer on the rootfs. Runs as the image's non-root `postgres` user
    # (uid 70), binds only 6432 (>1024), needs no added capabilities.
    environment:
      # Preserve the per-service least-privilege roles through the pooler (#387):
      # one userlist entry per role, so a compromised service (which only knows
      # its own role's password) can still only authenticate — and connect — as
      # itself. scram-sha-256 makes the entrypoint store the plaintext password,
      # which PgBouncer uses to authenticate the client AND SCRAM-auth to
      # Postgres. These are the same secrets the postgres container already holds.
      AUTH_TYPE: scram-sha-256
      DATABASE_URLS: postgresql://identity:${IDENTITY_DB_PASSWORD:?}@postgres:5432/identity_db,postgresql://provider:${PROVIDER_DB_PASSWORD:?}@postgres:5432/provider_db,postgresql://review:${REVIEW_DB_PASSWORD:?}@postgres:5432/review_db,postgresql://job:${JOB_DB_PASSWORD:?}@postgres:5432/job_db,postgresql://notification:${NOTIFICATION_DB_PASSWORD:?}@postgres:5432/notification_db,postgresql://search:${SEARCH_DB_PASSWORD:?}@postgres:5432/search_db,postgresql://trust_safety:${TRUST_SAFETY_DB_PASSWORD:?}@postgres:5432/trust_safety_db
    volumes:
      - ./deploy/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    networks: [backend]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  identity-service:
    image: ghcr.io/luminary-dev/service-hub-identity-service:${IMAGE_TAG:-prod}
    mem_limit: 384m
    <<: [*restart, *logging, *hardening]
    # TODO read_only: verify writable paths. Runs `prisma migrate deploy` on
    # boot; the migration engine's on-disk temp behaviour under a read-only
    # rootfs is unverified against a live DB, so left writable for now.
    environment:
      <<: *service-env
      PORT: 4001
      # Least-privilege DB role (#387): owns identity_db and nothing else, so a
      # compromised service can no longer read or write its peers' databases.
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://identity:${IDENTITY_DB_PASSWORD:?}@pgbouncer:6432/identity_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://identity:${IDENTITY_DB_PASSWORD:?}@postgres:5432/identity_db
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      # Shared session-revocation list (#374): identity publishes each
      # sessionVersion bump here so the gateway enforces revocations even during
      # an identity outage. Same Redis the gateway uses for rate limiting.
      # `default` is the ACL user requirepass sets the password for (Redis 6+);
      # naming it explicitly keeps secret scanners from reading the ${...}
      # placeholder as a hardcoded ":password@" credential.
      REDIS_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      # Social login (#398) — optional; unset → "Continue with Google" disabled.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      # Registration bot protection (#633) — optional; unset → Turnstile
      # verification is skipped and registration behaves as before.
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    # egress: OAuth code exchange calls Google/Facebook token endpoints, and
    # Turnstile siteverify (challenges.cloudflare.com) when enabled.
    networks: [backend, egress]
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *db-healthcheck

  provider-service:
    image: ghcr.io/luminary-dev/service-hub-provider-service:${IMAGE_TAG:-prod}
    mem_limit: 384m
    <<: [*restart, *logging, *hardening]
    # TODO read_only: verify writable paths (runs `prisma migrate deploy` on
    # boot — same unverified migration-engine temp behaviour as identity).
    environment:
      <<: *service-env
      PORT: 4002
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://provider:${PROVIDER_DB_PASSWORD:?}@pgbouncer:6432/provider_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://provider:${PROVIDER_DB_PASSWORD:?}@postgres:5432/provider_db
    networks: [backend]
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      media-service:
        condition: service_healthy
    healthcheck: *db-healthcheck

  review-service:
    image: ghcr.io/luminary-dev/service-hub-review-service:${IMAGE_TAG:-prod}
    mem_limit: 384m
    <<: [*restart, *logging, *hardening]
    # TODO read_only: verify writable paths (runs `prisma migrate deploy` on
    # boot — same unverified migration-engine temp behaviour as identity).
    environment:
      <<: *service-env
      PORT: 4003
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://review:${REVIEW_DB_PASSWORD:?}@pgbouncer:6432/review_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://review:${REVIEW_DB_PASSWORD:?}@postgres:5432/review_db
    networks: [backend]
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      media-service:
        condition: service_healthy
    healthcheck: *db-healthcheck

  job-service:
    image: ghcr.io/luminary-dev/service-hub-job-service:${IMAGE_TAG:-prod}
    mem_limit: 384m
    <<: [*restart, *logging, *hardening]
    # TODO read_only: verify writable paths (runs `prisma migrate deploy` on
    # boot — same unverified migration-engine temp behaviour as identity).
    environment:
      <<: *service-env
      PORT: 4004
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://job:${JOB_DB_PASSWORD:?}@pgbouncer:6432/job_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://job:${JOB_DB_PASSWORD:?}@postgres:5432/job_db
    networks: [backend]
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck: *db-healthcheck

  search-service:
    image: ghcr.io/luminary-dev/service-hub-search-service:${IMAGE_TAG:-prod}
    mem_limit: 384m
    <<: [*restart, *logging, *hardening]
    # TODO read_only: verify writable paths (runs `prisma migrate deploy` on
    # boot — same unverified migration-engine temp behaviour as identity).
    environment:
      <<: *service-env
      PORT: 4008
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://search:${SEARCH_DB_PASSWORD:?}@pgbouncer:6432/search_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://search:${SEARCH_DB_PASSWORD:?}@postgres:5432/search_db
    # backend only — it calls no external APIs (RFC §7: map tiles/geocoding are
    # fetched by the browser, never by this service), so no egress.
    networks: [backend]
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck: *db-healthcheck

  # Trust & safety extraction, phase 1 (docs/rfcs/trust-safety-service.md):
  # unified reports + moderation audit store. DARK LAUNCH — the gateway does
  # not route to it yet; deployed dark so the cutover release is a routing
  # flip. :4008 is reserved for search-service, so this takes :4009.
  trust-safety-service:
    image: ghcr.io/luminary-dev/service-hub-trust-safety-service:${IMAGE_TAG:-prod}
    mem_limit: 384m
    <<: [*restart, *logging, *hardening]
    # TODO read_only: verify writable paths (runs `prisma migrate deploy` on
    # boot — same unverified migration-engine temp behaviour as identity).
    environment:
      <<: *service-env
      PORT: 4009
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://trust_safety:${TRUST_SAFETY_DB_PASSWORD:?}@pgbouncer:6432/trust_safety_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://trust_safety:${TRUST_SAFETY_DB_PASSWORD:?}@postgres:5432/trust_safety_db
    networks: [backend]
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck: *db-healthcheck

  notification-service:
    image: ghcr.io/luminary-dev/service-hub-notification-service:${IMAGE_TAG:-prod}
    mem_limit: 384m
    <<: [*restart, *logging, *hardening]
    # TODO read_only: verify writable paths. Stateful since the RFC
    # (notification_db): runs `prisma migrate deploy` on boot — same unverified
    # migration-engine temp behaviour as the other four DB services, so the
    # rootfs is left writable for now (parity with identity/provider/review/job).
    environment:
      <<: *service-env
      PORT: 4005
      # Runtime queries go through the PgBouncer transaction pooler (#674).
      DATABASE_URL: postgresql://notification:${NOTIFICATION_DB_PASSWORD:?}@pgbouncer:6432/notification_db?pgbouncer=true
      # Migrations (start:migrate → prisma migrate deploy) go DIRECT to Postgres.
      DIRECT_URL: postgresql://notification:${NOTIFICATION_DB_PASSWORD:?}@postgres:5432/notification_db
      # Email delivery queue (BRPOPLPUSH + retries, RFC); Redis down → degraded
      # one-attempt direct sends (in-app rows are written inline either way).
      # `default` is the ACL user requirepass sets the password for (Redis 6+);
      # naming it explicitly keeps secret scanners from reading the ${...}
      # placeholder as a hardcoded ":password@" credential.
      REDIS_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    # egress: sends transactional mail via the Resend API.
    networks: [backend, egress]
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *db-healthcheck

  media-service:
    image: ghcr.io/luminary-dev/service-hub-media-service:${IMAGE_TAG:-prod}
    mem_limit: 512m
    <<: [*restart, *logging, *hardening]
    # TODO read_only: verify writable paths. Only the `provider`/`review`
    # namespaces have volumes below; in the local-disk fallback the `category`
    # and `user` namespaces write under /app/data on the rootfs, so a read-only
    # rootfs would break that path. Safe to enable only once R2 is guaranteed or
    # those two namespaces also get a volume/tmpfs.
    environment:
      <<: *service-env
      PORT: 4006
      MEDIA_DIR: /app/data
      # Storage precedence: R2 (all four set) > local disk. R2 is the
      # recommended prod backend (free tier, zero egress, private bucket
      # served through this service). Unset all → local disk (the volumes below,
      # which you MUST then back up).
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
    volumes:
      - provider_uploads:/app/data/provider
      - review_uploads:/app/data/review
    # egress: streams uploads to/from Cloudflare R2.
    networks: [backend, egress]
    healthcheck: *node-healthcheck

  chat-service:
    image: ghcr.io/luminary-dev/service-hub-chat-service:${IMAGE_TAG:-prod}
    mem_limit: 512m
    <<: [*restart, *logging, *hardening]
    # Stateless — proxies to the Anthropic API and the gateway; no disk writes.
    read_only: true
    tmpfs:
      - /tmp
    environment:
      <<: *service-env
      PORT: 4007
      GATEWAY_URL: http://api-gateway:4000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    # egress: proxies to the Anthropic API.
    networks: [backend, egress]
    healthcheck: *node-healthcheck

  api-gateway:
    image: ghcr.io/luminary-dev/service-hub-api-gateway:${IMAGE_TAG:-prod}
    mem_limit: 384m
    <<: [*restart, *logging, *hardening]
    # Stateless proxy — keeps its rate-limit state in Redis and writes nothing to
    # its own filesystem, so the rootfs is read-only with just a tmpfs for /tmp.
    read_only: true
    tmpfs:
      - /tmp
    environment:
      <<: *service-env
      PORT: 4000
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      WEB_ORIGIN: ${WEB_ORIGIN:?WEB_ORIGIN is required}
      # `default` is the ACL user requirepass sets the password for (Redis 6+);
      # naming it explicitly keeps secret scanners from reading the ${...}
      # placeholder as a hardcoded ":password@" credential.
      REDIS_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      # Trusted reverse-proxy hops in front of the gateway (#201). The socket
      # peer counts as the first hop, so with the Caddy → web → gateway chain
      # this is 2: the rate limiter then reads the real client IP from
      # X-Forwarded-For (right-to-left, skipping these hops) instead of a
      # client-forgeable value. See docs/RATE_LIMITING.md.
      TRUSTED_PROXY_HOPS: ${TRUSTED_PROXY_HOPS:-2}
    networks: [backend]
    depends_on:
      redis:
        condition: service_healthy
      media-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      provider-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      trust-safety-service:
        condition: service_healthy
    healthcheck: *node-healthcheck

  web:
    image: ghcr.io/luminary-dev/service-hub-web:${IMAGE_TAG:-prod}
    mem_limit: 640m
    <<: [*restart, *logging, *hardening]
    # Next's standalone server writes only its response cache under
    # /app/.next/cache (see the web Dockerfile), so the rootfs is read-only with a
    # tmpfs for that cache and for /tmp. The cache is per-container ephemeral data
    # (regenerated on demand), so a tmpfs is the right backing.
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    environment:
      NODE_ENV: production
      GATEWAY_URL: http://api-gateway:4000
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      NEXT_PUBLIC_SITE_URL: ${WEB_ORIGIN:?WEB_ORIGIN is required}
      # Registration bot protection (#633) — optional public site key, read at
      # request time and passed to the signup forms; unset → no widget rendered.
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      CHAT_SERVICE_URL: http://chat-service:4007
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      # Session-revocation check for page gating (src/lib/session-version.ts) —
      # reaches identity directly with the internal secret; fails open if unset.
      IDENTITY_SERVICE_URL: http://identity-service:4001
      # Feature flags (#675), evaluated server-side by src/lib/flags.ts. The URL
      # is static (internal), but the TOKEN is the activation switch: unset (the
      # default) → flags.ts is a no-op and every flag falls back to its coded
      # default, so behavior is unchanged. Set UNLEASH_FRONTEND_TOKEN only AFTER
      # you've created + enabled the flags in Unleash (docs/OPERATIONS.md).
      UNLEASH_URL: http://unleash:4242/api
      UNLEASH_FRONTEND_TOKEN: ${UNLEASH_FRONTEND_TOKEN:-}
    # Straddles both networks: reachable from Caddy on edge, reaches the
    # gateway / chat / identity on backend.
    networks: [edge, backend]
    depends_on:
      api-gateway:
        condition: service_healthy
      chat-service:
        condition: service_healthy
    # Probes the app's own /healthz route (deliberately gateway-independent), so
    # the deploy health-gate covers the user-facing site (#385). $PORT=3000
    # comes from the image env (see the web Dockerfile).
    healthcheck: *node-healthcheck

  # Observability (#668), metrics foundation. Prometheus scrapes every service's
  # /metrics over the internal backend network (see deploy/observability/
  # prometheus.yml); Grafana provisions a Prometheus datasource + a starter RED
  # dashboard from deploy/observability/. Neither is a public surface: both live
  # on `backend` only and publish their host ports to LOOPBACK (#387), so an
  # operator reaches Grafana via an SSH tunnel (ssh -L 3001:127.0.0.1:3001 …,
  # then http://localhost:3001 — admin / ${GRAFANA_ADMIN_PASSWORD}). There is no
  # Caddy route to either. Logs (Loki), tracing (OTel/Tempo) and error capture
  # are planned follow-ups on #668 — not part of this slice.
  prometheus:
    # dependabot: prom/prometheus:v3.1.0
    image: prom/prometheus:v3.1.0@sha256:6559acbd5d770b15bb3c954629ce190ac3cbbdb2b7f1c30f0385c4e05104e218
    mem_limit: 512m
    <<: [*restart, *logging, *hardening]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Bound retention so the metrics TSDB can't fill the single VPS's disk.
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      # Loopback only — reachable from the host (SSH tunnel) for ad-hoc PromQL,
      # never from the LAN/internet.
      - "127.0.0.1:9090:9090"
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  grafana:
    # dependabot: grafana/grafana:11.4.0
    image: grafana/grafana:11.4.0@sha256:d8ea37798ccc41061a62ab080f2676dda6bf7815558499f901bdb0f533a456fb
    mem_limit: 256m
    <<: [*restart, *logging, *hardening]
    environment:
      # Required secret: no dev fallback, so the stack refuses to start with a
      # default admin password (mirrors the AUTH_SECRET / INTERNAL_API_SECRET
      # guards). Rotate by changing this and recreating the container.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Absolute URL for correct redirects behind the loopback publish.
      GF_SERVER_ROOT_URL: "http://localhost:3001/"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      # Loopback only (SSH tunnel to reach the UI); Grafana serves on 3000
      # in-container, published on host 3001 (3000 is not used on the server).
      - "127.0.0.1:3001:3000"
    networks: [backend]
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # Feature flags (#675) — self-hosted Unleash + its OWN Postgres (never the app
  # cluster: separate container, separate volume, separate role). Like Grafana,
  # it's internal-only — `backend` network, NO Caddy route, host port published
  # to LOOPBACK (#387) so an operator reaches the admin UI via an SSH tunnel
  # (ssh -L 4242:127.0.0.1:4242 <server>, then http://localhost:4242). The web
  # app reads flags SERVER-SIDE and DEGRADES GRACEFULLY (src/lib/flags.ts): with
  # UNLEASH_FRONTEND_TOKEN unset it never calls Unleash and returns each flag's
  # documented default, so shipping this stack changes NO product behavior until
  # an operator provisions a token. See docs/OPERATIONS.md → Feature flags.
  unleash-db:
    # dependabot: postgres:16-alpine
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    mem_limit: 256m
    <<: [*restart, *logging, *hardening]
    # The postgres entrypoint starts as root to chown the data dir, then drops to
    # the `postgres` user — so under cap_drop: ALL it needs these back (same as
    # the app postgres block above).
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_USER: unleash
      # Required secret: no dev fallback (mirrors GRAFANA_ADMIN_PASSWORD and the
      # per-service DB roles). URL-interpolated into DATABASE_URL below → hex.
      POSTGRES_PASSWORD: ${UNLEASH_DB_PASSWORD:?UNLEASH_DB_PASSWORD is required}
      POSTGRES_DB: unleash
    volumes:
      - unleash_db_data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash -h 127.0.0.1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  unleash:
    # dependabot: unleashorg/unleash-server:7.6
    image: unleashorg/unleash-server:7.6@sha256:1a35c84bf532272e15464c62c0d1f865273e9b3a0c8d34b1d960cc8f2ba55c85
    mem_limit: 512m
    <<: [*restart, *logging, *hardening]
    environment:
      DATABASE_URL: postgres://unleash:${UNLEASH_DB_PASSWORD:?}@unleash-db:5432/unleash
      DATABASE_SSL: "false"
      # No phone-home version check → Unleash stays on the internet-less backend
      # network (no egress), like every other internal service.
      CHECK_VERSION: "false"
      # Absolute URL for correct admin-UI redirects behind the loopback publish.
      UNLEASH_URL: "http://localhost:4242"
      # Optional: seed the Frontend API token the web app consumes so a fresh
      # instance is usable without a manual admin step. Empty (the default) → the
      # operator creates the token in the admin UI instead. Format:
      # <project>:<environment>.<secret>, e.g. default:production.<hex>.
      INIT_FRONTEND_API_TOKENS: ${UNLEASH_FRONTEND_TOKEN:-}
    ports:
      # Loopback only (SSH tunnel to reach the admin UI); no public/Caddy route.
      - "127.0.0.1:4242:4242"
    networks: [backend]
    depends_on:
      unleash-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4242/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # The only public surface: terminates TLS (auto Let's Encrypt) and proxies to
  # the web app, which in turn proxies /api/* to the gateway internally.
  caddy:
    # dependabot: caddy:2-alpine
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    mem_limit: 128m
    <<: [*restart, *logging, *hardening]
    # Caddy binds the privileged ports 80/443; its binary ships with the
    # net_bind_service file capability, so under cap_drop: ALL + no-new-privileges
    # it can't even exec ("Operation not permitted") until this is granted back.
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required (the public hostname, e.g. baas.lk)}
      # Safe-by-default ACME email (#387): the Caddyfile's global `email`
      # option takes this verbatim, and an empty argument fails config load —
      # crash-looping the only public entrypoint. Default to a deliverable
      # address on the site's own domain when the secret is unset.
      ACME_EMAIL: ${ACME_EMAIL:-admin@${DOMAIN:?}}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # Edge only (#387): the public entry can reach the web app and nothing
    # else — no direct route to the gateway, the services, or the datastores.
    networks: [edge]
    # Probes Caddy's always-on admin API (localhost:2019) so the health-gate
    # also covers the public edge (#385): it fails until the Caddyfile has
    # loaded, and unlike a probe of :80/:443 it doesn't depend on the domain's
    # DNS/ACME state — a fresh host must come up healthy before certs exist.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2019/config/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    depends_on:
      web:
        condition: service_healthy

# Network split (#387) — replaces the flat default network:
#   edge    — Caddy ↔ web only: a compromised edge can reach nothing internal.
#   backend — services + datastores; `internal: true`, so containers on ONLY
#             this network (gateway, provider/review/job, postgres, redis)
#             have no route to the internet at all.
#   egress  — plain bridge granting outbound internet to the services that
#             call external APIs (identity: OAuth token exchange,
#             notification: Resend, media: R2, chat: Anthropic). Publishes
#             no ports; nothing accepts traffic on it.
networks:
  edge:
  backend:
    internal: true
  egress:

volumes:
  pgdata:
  redis_data:
  provider_uploads:
  review_uploads:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  unleash_db_data:
