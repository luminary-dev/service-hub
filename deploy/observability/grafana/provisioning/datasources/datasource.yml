# Grafana provisioned datasource (#668). Auto-loaded on startup so Grafana comes
# up already pointed at Prometheus — no manual click-through. Reaches Prometheus
# by its Docker-network service name.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Loki log aggregation (#668, log-aggregation follow-up). Grafana Alloy ships
  # every container's parsed JSON logs here; reach them via Explore or the
  # "Logs — service-hub" dashboard. Reached by Docker-network service name.
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
