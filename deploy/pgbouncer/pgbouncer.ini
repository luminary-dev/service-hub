; PgBouncer transaction pooler in front of the single Postgres cluster (#674).
;
; WHY: every DB-owning service runs its own Prisma connection pool, and each is
; replicated behind the deploy. pool_count x replicas x per-pool connections
; scales past Postgres's `max_connections` (default 100) and exhausts it. A
; transaction pooler collapses many short-lived client connections onto a small
; set of shared server connections, so the services can keep generous local
; pools without the cluster running out of backends.
;
; This file is MOUNTED read-only into edoburu/pgbouncer at
; /etc/pgbouncer/pgbouncer.ini (both docker-compose.yml and
; docker-compose.prod.yml). The image's entrypoint only auto-generates a config
; when none is present, so mounting this one makes it authoritative; the
; entrypoint still generates /etc/pgbouncer/userlist.txt from the DATABASE_URL(S)
; env we pass (AUTH_TYPE=scram-sha-256 stores the plaintext password, which lets
; PgBouncer both authenticate the incoming client and SCRAM-auth to Postgres).

[databases]
; Wildcard: a client connecting to logical db <name> as role <role> is pooled
; onto a Postgres server connection to db <name> as that SAME <role> (no forced
; user= here). This preserves the per-service least-privilege roles (#387): a
; service only knows its own role's password, so it can only ever authenticate
; — and therefore connect — as its own role to its own database. In dev every
; service shares the single `postgres` superuser, which works identically.
* = host=postgres port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Transaction pooling: a server connection is returned to the pool at the end of
; every transaction, so N clients share far fewer backends. Prisma 7's pg driver
; adapter uses only unnamed prepared statements and wraps multi-statement work in
; BEGIN/COMMIT, so it is safe under transaction pooling. Session-scoped state
; (named prepared statements, session SET, advisory locks across transactions,
; LISTEN/NOTIFY) is NOT — and migrations, which need exactly that, bypass the
; pooler entirely via each service's DIRECT_URL (see prisma.config.ts).
pool_mode = transaction

auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Client-facing headroom (cheap; these are just client sockets), kept well below
; what would matter while the server-side pools stay small.
max_client_conn = 1000
; Server connections opened per (user, database) pair. Seven databases x this
; stays comfortably under Postgres's default max_connections (100), with room
; for the superuser (migrations run direct, backups, psql).
default_pool_size = 10
min_pool_size = 0
reserve_pool_size = 5
reserve_pool_timeout = 3

; Recycle idle/aged server connections so a rolling Postgres restart or a role
; password rotation is picked up without bouncing the pooler.
server_idle_timeout = 240
server_lifetime = 3600

; node-postgres negotiates extra_float_digits on connect; PgBouncer rejects
; unknown startup parameters unless they are ignored here.
ignore_startup_parameters = extra_float_digits

; Only the superuser may reach the internal `pgbouncer` admin console.
admin_users = postgres
