name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Dummy value so `prisma generate` and module init don't need real secrets.
# Nothing here connects to a real database.
env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/job_db"

jobs:
  ci:
    name: typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
