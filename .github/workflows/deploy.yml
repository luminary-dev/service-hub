name: Deploy

# Builds and publishes a container image per service + web to GHCR on every push
# to prod (the deploy branch), then — once a production server exists — pulls and
# restarts the stack there. The deploy job is inert until the repo variable
# DEPLOY_ENABLED is set to "true" and the PROD_SSH_* secrets are configured
# (tracked by #110); publishing images works on its own before then.
on:
  push:
    branches: [prod]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

# Default-deny; each job opts into exactly the scopes it needs.
permissions: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only ever publish :prod images from the prod branch. `workflow_dispatch`
    # has no ref restriction of its own, so without this guard a manual dispatch
    # from any feature branch would build + push ghcr …:prod from unreviewed
    # code, bypassing the dev→prod PR gate (#383).
    if: github.ref == 'refs/heads/prod'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - web
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - search-service
          - api-gateway
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          # web builds from the repo root; each service from its own directory.
          # Pushed by SHA only — :prod is re-pointed atomically by tag-prod
          # below, so a partial matrix failure never leaves :prod mixed (#573).
          context: ${{ matrix.image == 'web' && '.' || format('services/{0}', matrix.image) }}
          push: true
          tags: ghcr.io/luminary-dev/service-hub-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # Move every :prod tag in one post-matrix job that only runs when ALL ten
  # builds succeeded (#573). Tagging :prod inside the matrix re-pointed it
  # per-image as legs finished, so one failed leg (e.g. a media/sharp flake,
  # #351) left :prod as a mixed-version set that a manual `IMAGE_TAG=prod`
  # `up -d` would happily run. `imagetools create` copies the manifest in the
  # registry — no rebuild, no pull.
  tag-prod:
    name: Tag :prod
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/prod'
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Point every :prod tag at ${{ github.sha }}
        run: |
          for image in web identity-service provider-service review-service \
                       job-service notification-service media-service \
                       chat-service search-service api-gateway; do
            docker buildx imagetools create \
              --tag "ghcr.io/luminary-dev/service-hub-$image:prod" \
              "ghcr.io/luminary-dev/service-hub-$image:$GITHUB_SHA"
          done

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # A hung rollout must not hold the (uncancellable) deploy-prod concurrency
    # group for the 6h default (#386). Two health-gated `up -d --wait`s cap at
    # ~5min each, plus pulls; 20min is a comfortable ceiling.
    timeout-minutes: 20
    # Deploys over SSH with its own secrets — it needs no GITHUB_TOKEN scope.
    permissions: {}
    # Prod-branch only (#383) + stays skipped until the production host (#110)
    # is provisioned and this repo variable is flipped on. Images are still
    # published by the job above.
    if: ${{ github.ref == 'refs/heads/prod' && vars.DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
          HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          APP_DIR: ${{ secrets.PROD_APP_DIR }}
          TAG: ${{ github.sha }}
          # App runtime config → rendered into the server's .env on every deploy,
          # so GitHub secrets are the single source of truth (the repo is public;
          # nothing sensitive lives in the tree). Optional vars may be empty;
          # docker-compose.prod.yml's ${VAR:?} guards fail loudly on a missing
          # required one (AUTH_SECRET / INTERNAL_API_SECRET / POSTGRES_PASSWORD /
          # the per-service *_DB_PASSWORDs / REDIS_PASSWORD / WEB_ORIGIN /
          # DOMAIN).
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # Per-service DB roles + Redis AUTH (#387). URL-interpolated by the
          # compose file, so generate URL-safe values: `openssl rand -hex 32`.
          IDENTITY_DB_PASSWORD: ${{ secrets.IDENTITY_DB_PASSWORD }}
          PROVIDER_DB_PASSWORD: ${{ secrets.PROVIDER_DB_PASSWORD }}
          REVIEW_DB_PASSWORD: ${{ secrets.REVIEW_DB_PASSWORD }}
          JOB_DB_PASSWORD: ${{ secrets.JOB_DB_PASSWORD }}
          SEARCH_DB_PASSWORD: ${{ secrets.SEARCH_DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          WEB_ORIGIN: ${{ secrets.WEB_ORIGIN }}
          DOMAIN: ${{ secrets.DOMAIN }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FACEBOOK_CLIENT_ID: ${{ secrets.FACEBOOK_CLIENT_ID }}
          FACEBOOK_CLIENT_SECRET: ${{ secrets.FACEBOOK_CLIENT_SECRET }}
        run: |
          install -m 600 /dev/stdin "$HOME/deploy_key" <<< "$SSH_KEY"
          # Host-key pinning (#388): the runner's known_hosts is empty every
          # run, so `accept-new` would trust whichever host answers — and the
          # very next steps pipe the full rendered .env to it. Pin the expected
          # key(s) from PROD_SSH_KNOWN_HOSTS (ssh-keyscan output); a mismatch
          # fails the deploy before any secret leaves the runner.
          if [ -z "$SSH_KNOWN_HOSTS" ]; then
            echo "PROD_SSH_KNOWN_HOSTS is not set — refusing to connect unpinned." >&2
            exit 1
          fi
          install -m 600 /dev/stdin "$HOME/known_hosts" <<< "$SSH_KNOWN_HOSTS"
          SSH=(ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/known_hosts" -i "$HOME/deploy_key" "$SSH_USER@$HOST")
          # 0) Record the currently-deployed IMAGE_TAG from the server's .env
          #    BEFORE we overwrite it, so a failed rollout can be rolled back.
          PREV_TAG=$("${SSH[@]}" "grep -E '^IMAGE_TAG=' '$APP_DIR/.env' 2>/dev/null | tail -1 | cut -d= -f2- || true")
          echo "Previous IMAGE_TAG: ${PREV_TAG:-<none>}"
          # 1) Render $APP_DIR/.env from the secrets above — piped over the
          #    encrypted channel, so no value is ever printed to the log.
          #    Compose's dotenv parser interpolates `$` and truncates unquoted
          #    values at ` #`, so raw KEY=value lines silently mangle rotated
          #    secrets containing $, #, or whitespace (#572). Values are written
          #    double-quoted with compose-dotenv escaping (\ → \\, " → \",
          #    $ → $$, newline/CR → \n/\r), which round-trips arbitrary strings.
          {
            for k in AUTH_SECRET INTERNAL_API_SECRET POSTGRES_PASSWORD \
                     IDENTITY_DB_PASSWORD PROVIDER_DB_PASSWORD REVIEW_DB_PASSWORD \
                     JOB_DB_PASSWORD SEARCH_DB_PASSWORD REDIS_PASSWORD WEB_ORIGIN \
                     DOMAIN ACME_EMAIL ANTHROPIC_API_KEY RESEND_API_KEY EMAIL_FROM \
                     R2_ENDPOINT R2_BUCKET R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY \
                     GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET \
                     FACEBOOK_CLIENT_ID FACEBOOK_CLIENT_SECRET; do
              v="${!k}"
              v="${v//\\/\\\\}"
              v="${v//\"/\\\"}"
              v="${v//\$/\$\$}"
              v="${v//$'\n'/\\n}"
              v="${v//$'\r'/\\r}"
              printf '%s="%s"\n' "$k" "$v"
            done
            # IMAGE_TAG is a git sha — kept unquoted so the PREV_TAG grep/cut
            # readback (step 0) and the rollback sed (step 2) stay verbatim.
            printf 'IMAGE_TAG=%s\n' "$TAG"
          } | "${SSH[@]}" "umask 077 && mkdir -p '$APP_DIR' && cat > '$APP_DIR/.env'"
          # 2) Pull the prod branch + images, then a HEALTH-GATED (re)start:
          #    `up -d --wait` blocks until every container with a healthcheck is
          #    healthy and none has exited (every container has one — including
          #    web and caddy, #385 — so the gate covers the public site), so a
          #    crash-loop or a failed `prisma migrate deploy` fails the deploy
          #    instead of silently replacing the running stack. The 300s wait
          #    allows for the DB services' 120s migration start_period plus the
          #    retry budget (#568). On failure we roll back to the previous
          #    IMAGE_TAG AND the previous compose/deploy config (#385):
          #    `git reset --hard origin/prod` above may itself be what broke
          #    the rollout, so re-running the new compose file against the old
          #    images could fail identically. A rollback that STILL comes up
          #    unhealthy is reported loudly instead of swallowed. Pruning
          #    happens only AFTER a healthy rollout and keeps the previous tag,
          #    so rollback stays a one-liner.
          "${SSH[@]}" bash -s <<EOF
            set -euo pipefail
            cd "$APP_DIR"
            COMPOSE="docker compose -f docker-compose.prod.yml"
            PREV_SHA=\$(git rev-parse HEAD 2>/dev/null || true)
            git fetch origin prod && git reset --hard origin/prod
            \$COMPOSE pull
            if \$COMPOSE up -d --remove-orphans --wait --wait-timeout 300; then
              echo "Deploy healthy."
              # Prune superseded images (#567): tagged images are never
              # "dangling", so a plain prune left every old :<sha> set on disk
              # forever. Drop each service-hub :<sha> tag except the one just
              # deployed and its predecessor (kept for instant rollback), then
              # clear the now-dangling layers.
              docker images --format '{{.Repository}}:{{.Tag}}' \
                  --filter 'reference=ghcr.io/luminary-dev/service-hub-*' \
                | grep -E ':[0-9a-f]{40}\$' \
                | grep -v -e ":${TAG}\$" ${PREV_TAG:+-e ":${PREV_TAG}\$"} \
                | xargs -r docker rmi || true
              docker image prune -f
            else
              echo "Deploy UNHEALTHY — attempting rollback to '${PREV_TAG:-<none>}'." >&2
              \$COMPOSE ps
              if [ -n "${PREV_TAG:-}" ]; then
                sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${PREV_TAG}/" .env
                # Restore the previously-deployed compose file + deploy config
                # alongside the image tag. The next successful deploy's
                # `git reset --hard origin/prod` clears this checkout again.
                if [ -n "\$PREV_SHA" ]; then
                  git checkout "\$PREV_SHA" -- docker-compose.prod.yml deploy/ \
                    || echo "WARNING: could not restore compose/deploy config from \$PREV_SHA; retrying with the new one." >&2
                fi
                \$COMPOSE pull
                if \$COMPOSE up -d --remove-orphans --wait --wait-timeout 300; then
                  echo "Rolled back to ${PREV_TAG}." >&2
                else
                  echo "ROLLBACK FAILED — stack may be down or unhealthy. Manual intervention required (see docs/DEPLOYMENT.md#rollback)." >&2
                  \$COMPOSE ps >&2
                fi
              else
                echo "No previous IMAGE_TAG recorded; cannot auto-roll back." >&2
              fi
              exit 1
            fi
          EOF
