name: Deploy

# Builds and publishes a container image per service + web to GHCR on every push
# to prod (the deploy branch), then — once a production server exists — pulls and
# restarts the stack there. The deploy job is inert until the repo variable
# DEPLOY_ENABLED is set to "true" and the PROD_SSH_* secrets are configured
# (tracked by #110); publishing images works on its own before then.
on:
  push:
    branches: [prod]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

# Default-deny; each job opts into exactly the scopes it needs.
permissions: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - web
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - api-gateway
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          # web builds from the repo root; each service from its own directory.
          context: ${{ matrix.image == 'web' && '.' || format('services/{0}', matrix.image) }}
          push: true
          tags: |
            ghcr.io/luminary-dev/service-hub-${{ matrix.image }}:prod
            ghcr.io/luminary-dev/service-hub-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Deploys over SSH with its own secrets — it needs no GITHUB_TOKEN scope.
    permissions: {}
    # Stays skipped until the production host (#110) is provisioned and this repo
    # variable is flipped on. Images are still published by the job above.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          APP_DIR: ${{ secrets.PROD_APP_DIR }}
          TAG: ${{ github.sha }}
          # App runtime config → rendered into the server's .env on every deploy,
          # so GitHub secrets are the single source of truth (the repo is public;
          # nothing sensitive lives in the tree). Optional vars may be empty;
          # docker-compose.prod.yml's ${VAR:?} guards fail loudly on a missing
          # required one (AUTH_SECRET / INTERNAL_API_SECRET / POSTGRES_PASSWORD /
          # WEB_ORIGIN / DOMAIN).
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          WEB_ORIGIN: ${{ secrets.WEB_ORIGIN }}
          DOMAIN: ${{ secrets.DOMAIN }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          install -m 600 /dev/stdin "$HOME/deploy_key" <<< "$SSH_KEY"
          SSH=(ssh -o StrictHostKeyChecking=accept-new -i "$HOME/deploy_key" "$SSH_USER@$HOST")
          # 0) Record the currently-deployed IMAGE_TAG from the server's .env
          #    BEFORE we overwrite it, so a failed rollout can be rolled back.
          PREV_TAG=$("${SSH[@]}" "grep -E '^IMAGE_TAG=' '$APP_DIR/.env' 2>/dev/null | tail -1 | cut -d= -f2- || true")
          echo "Previous IMAGE_TAG: ${PREV_TAG:-<none>}"
          # 1) Render $APP_DIR/.env from the secrets above — piped over the
          #    encrypted channel, so no value is ever printed to the log.
          {
            for k in AUTH_SECRET INTERNAL_API_SECRET POSTGRES_PASSWORD WEB_ORIGIN \
                     DOMAIN ACME_EMAIL ANTHROPIC_API_KEY RESEND_API_KEY EMAIL_FROM \
                     R2_ENDPOINT R2_BUCKET R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY; do
              printf '%s=%s\n' "$k" "${!k}"
            done
            printf 'IMAGE_TAG=%s\n' "$TAG"
          } | "${SSH[@]}" "umask 077 && mkdir -p '$APP_DIR' && cat > '$APP_DIR/.env'"
          # 2) Pull the prod branch + images, then a HEALTH-GATED (re)start:
          #    `up -d --wait` blocks until every container with a healthcheck is
          #    healthy and none has exited, so a crash-loop or a failed
          #    `prisma migrate deploy` fails the deploy instead of silently
          #    replacing the running stack. On failure we roll the stack back to
          #    the previous IMAGE_TAG and exit non-zero. The old image is pruned
          #    only AFTER a healthy rollout, so rollback stays a one-liner.
          "${SSH[@]}" bash -s <<EOF
            set -euo pipefail
            cd "$APP_DIR"
            COMPOSE="docker compose -f docker-compose.prod.yml"
            git fetch origin prod && git reset --hard origin/prod
            \$COMPOSE pull
            if \$COMPOSE up -d --remove-orphans --wait --wait-timeout 180; then
              echo "Deploy healthy."
              docker image prune -f
            else
              echo "Deploy UNHEALTHY — attempting rollback to '${PREV_TAG:-<none>}'." >&2
              \$COMPOSE ps
              if [ -n "${PREV_TAG:-}" ]; then
                sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${PREV_TAG}/" .env
                \$COMPOSE pull
                \$COMPOSE up -d --remove-orphans --wait --wait-timeout 180 || true
                echo "Rolled back to ${PREV_TAG}." >&2
              else
                echo "No previous IMAGE_TAG recorded; cannot auto-roll back." >&2
              fi
              exit 1
            fi
          EOF
