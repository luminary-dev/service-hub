name: Release

# Version tagging + GitHub Releases (#239). Pushing a semver git tag (e.g.
# v0.1.0) publishes a versioned image per service + web to GHCR (in addition to
# the :prod / :<sha> tags that deploy.yml pushes on the prod branch) and cuts a
# GitHub Release with auto-generated notes. This gives a durable, human-readable
# release marker and lets a container be mapped back to a released version.
on:
  push:
    tags:
      - "v*"

# Default-deny; each job opts into exactly the scopes it needs.
permissions: {}

jobs:
  images:
    name: Publish ${{ matrix.image }} @ ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - web
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - api-gateway
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          # web builds from the repo root; each service from its own directory.
          context: ${{ matrix.image == 'web' && '.' || format('services/{0}', matrix.image) }}
          push: true
          tags: |
            ghcr.io/luminary-dev/service-hub-${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/luminary-dev/service-hub-${{ matrix.image }}:latest
          # Share the layer cache with deploy.yml's per-image scopes so a tag
          # built off an already-built prod commit reuses those layers.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  release:
    name: Create GitHub Release
    needs: images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Create release with generated notes
        # Pass the tag through the environment rather than interpolating
        # ${{ github.ref_name }} straight into the script (#386): a tag name is
        # attacker-influenceable, so keep it out of the shell command text.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            --verify-tag
