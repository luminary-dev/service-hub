name: CI

on:
  pull_request:
    branches: [dev, prod]
  push:
    branches: [dev, prod]

# Cancel superseded runs: only the latest commit of a PR/branch needs to be
# green. Each ref gets its own group, so post-merge dev/prod runs never cancel
# one another.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Dummy values so module init and `next build` don't need real secrets.
# Nothing here connects to a real database or is used at runtime.
env:
  DATABASE_URL: "postgresql://user:password@localhost:5432/db?schema=public"
  AUTH_SECRET: "ci-dummy-secret"
  GATEWAY_URL: "http://localhost:4000"

jobs:
  web:
    name: web / ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck, lint, test, build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run ${{ matrix.check }}

  services:
    name: ${{ matrix.package }} / ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - search-service
          - trust-safety-service
          - api-gateway
        check: [typecheck, test, build]
    defaults:
      run:
        working-directory: services/${{ matrix.package }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/${{ matrix.package }}/package-lock.json
      - run: npm ci
      - run: npm run ${{ matrix.check }}

  # Dead-code / unused-dependency scan (#673). knip runs across all 11 packages
  # and reports unused files, exports and dependencies. REPORT-ONLY for now
  # (continue-on-error) so it never fails CI on day one: there's a backlog of
  # intentionally-uniform per-service template exports (lib/http.ts et al.) to
  # triage first. Tighten to a hard gate once that's burned down — see
  # docs/TESTING.md → "Dead-code scanning (knip)".
  knip:
    name: knip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - name: Install workspace dependencies
        # knip resolves each package against its own node_modules (this monorepo
        # is not npm-hoisted — every service is its own package), so install the
        # web root and each service before scanning.
        run: |
          npm ci
          for d in services/*/; do (cd "$d" && npm ci); done
      - name: Run knip (report-only)
        # Report-only for now: knip surfaces ~107 genuine-but-low-priority unused
        # exports (mostly the deliberately-uniform per-service lib templates), so
        # it must not gate CI yet — the findings are in the log to triage/tighten
        # later. Drop the `|| true` once the backlog is cleared to make it blocking.
        run: npm run knip || true

  # Prod compose validation (#512): the fast per-package matrix and the e2e
  # smoke both exercise the *dev* `docker-compose.yml`; the file that actually
  # ships — `docker-compose.prod.yml` — was only ever parsed at deploy time over
  # SSH, so a syntax error, bad anchor, broken `${VAR:?}`, wrong image name, or
  # malformed healthcheck/mem_limit surfaced only during a live deploy (and the
  # two files had already drifted). `docker compose config` fully
  # parses/interpolates the file without pulling images or starting anything, so
  # it's a cheap gate. Dummy values satisfy the required `${VAR:?}` guards so
  # interpolation succeeds; the step fails loudly if the file is invalid.
  prod-compose:
    name: compose-config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate docker-compose.prod.yml
        # Dummies only satisfy interpolation — nothing connects or is pulled.
        # ACME_EMAIL stays deliberately unset to exercise its compose default
        # (admin@${DOMAIN}, #387).
        env:
          AUTH_SECRET: ci-dummy-secret
          INTERNAL_API_SECRET: ci-dummy-secret
          POSTGRES_PASSWORD: ci-dummy-password
          IDENTITY_DB_PASSWORD: ci-dummy-password
          PROVIDER_DB_PASSWORD: ci-dummy-password
          REVIEW_DB_PASSWORD: ci-dummy-password
          JOB_DB_PASSWORD: ci-dummy-password
          NOTIFICATION_DB_PASSWORD: ci-dummy-password
          SEARCH_DB_PASSWORD: ci-dummy-password
          TRUST_SAFETY_DB_PASSWORD: ci-dummy-password
          REDIS_PASSWORD: ci-dummy-password
          GRAFANA_ADMIN_PASSWORD: ci-dummy-password
          UNLEASH_DB_PASSWORD: ci-dummy-password
          GLITCHTIP_DB_PASSWORD: ci-dummy-password
          GLITCHTIP_SECRET_KEY: ci-dummy-secret
          WEB_ORIGIN: https://ci.example.test
          DOMAIN: ci.example.test
          # CrowdSec bouncer key (#670) — dummy, only satisfies interpolation.
          CROWDSEC_BOUNCER_API_KEY: ci-dummy-key
        run: docker compose -f docker-compose.prod.yml config -q
      - name: Build custom Caddy + validate deploy/Caddyfile
        # `caddy validate` catches a Caddyfile that would crash-loop the only
        # public entrypoint at deploy time (#387). The Caddyfile now uses the
        # CrowdSec bouncer directive (#670), which stock caddy:2-alpine cannot
        # parse — so build the SAME custom image the prod stack builds
        # (deploy/caddy/Dockerfile: xcaddy + the pinned bouncer plugin) and
        # validate WITH IT, so the crowdsec directive is actually exercised. The
        # build itself asserts the plugin linked in (`caddy list-modules | grep
        # crowdsec` in the Dockerfile). ACME_EMAIL mirrors the compose default
        # used when the secret is unset (an EMPTY value is the known failure mode
        # this guards against); CROWDSEC_BOUNCER_API_KEY is a dummy for
        # interpolation only.
        run: |
          docker build -t service-hub-caddy:ci deploy/caddy
          docker run --rm \
            -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -e DOMAIN=ci.example.test -e ACME_EMAIL=admin@ci.example.test \
            -e CROWDSEC_BOUNCER_API_KEY=ci-dummy-key \
            service-hub-caddy:ci \
            caddy validate --config /etc/caddy/Caddyfile

  # Coverage (#262): collect per-package coverage for visibility + a ratchet.
  # `npm run coverage` enforces the low baseline thresholds in each package's
  # vitest config — they pass today, so this never fails the build now; it only
  # trips if coverage regresses below the floor. Separate from the fast matrix.
  coverage:
    name: ${{ matrix.package }} / coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - web
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - search-service
          - trust-safety-service
          - api-gateway
    defaults:
      run:
        working-directory: ${{ matrix.package == 'web' && '.' || format('services/{0}', matrix.package) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.package == 'web' && 'package-lock.json' || format('services/{0}/package-lock.json', matrix.package) }}
      - run: npm ci
      - name: Collect coverage
        run: npm run coverage
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage — ${{ matrix.package }}" >> "$GITHUB_STEP_SUMMARY"
            node -e "const t=require('./coverage/coverage-summary.json').total;for(const k of ['lines','statements','functions','branches'])console.log('- '+k+': '+t[k].pct+'% ('+t[k].covered+'/'+t[k].total+')')" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.package }}
          path: ${{ matrix.package == 'web' && 'coverage' || format('services/{0}/coverage', matrix.package) }}
          if-no-files-found: ignore
      - name: Upload to Codecov
        # Ingests the per-package lcov (#262 already emits coverage/) so Codecov
        # can post per-PR diff-coverage comments across all 11 packages (#671).
        # `flags` keep each package's coverage a separate component in Codecov.
        # Public repos don't strictly need a token, but uploads are more
        # reliable with one — set the `CODECOV_TOKEN` repo secret and it's used
        # automatically. fail_ci_if_error stays false: a Codecov outage must
        # never fail the build (this is visibility, not a gate).
        if: always()
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          flags: ${{ matrix.package }}
          directory: ${{ matrix.package == 'web' && 'coverage' || format('services/{0}/coverage', matrix.package) }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Integration / e2e (#241): boot the whole compose stack and run the
  # cross-service smoke script against it. PRs only (booting + building the full
  # stack is heavy) and a separate job, so it never blocks the fast per-package
  # matrix above.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Bake + boot + seed the stack (shared with the playwright/lighthouse
      # jobs via the composite action, so all three boot identically, #671).
      - uses: ./.github/actions/boot-stack
      - name: Run e2e smoke
        env:
          INTERNAL_API_SECRET: dev-internal-secret
        run: ./scripts/e2e-smoke.sh
      - name: Back up and restore-verify
        # Exercises the backup → restore-verification path (#389) against the
        # seeded stack: dump all 6 service DBs (search_db excluded — a derived,
        # rebuildable index), restore them into a scratch container,
        # row-count the main tables — so a broken dump/restore script fails CI
        # instead of a real disaster recovery. (No BACKUP_R2_* here, so the
        # offsite leg is skipped with a warning.)
        run: |
          COMPOSE_FILE=docker-compose.yml ./scripts/backup-dbs.sh
          ./scripts/verify-backup.sh
      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=120
      - name: Tear down
        if: always()
        run: docker compose down -v

  # Browser E2E (#671): the flagship tier that renders each page in a real
  # Chromium and drives the conversion-critical flows — the check that would
  # have caught the #706 /admin/providers SSR crash the curl smoke missed. PRs
  # only (booting the full stack is heavy) and a separate job so it never blocks
  # the fast per-package matrix; complements — does not replace — the curl smoke.
  playwright:
    name: playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - uses: ./.github/actions/boot-stack
      - name: Run Playwright specs
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npx playwright test
      - name: Upload Playwright report
        # HTML report + traces/screenshots/video for any failure (trace is
        # captured on first retry). The primary triage artifact.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=120
      - name: Tear down
        if: always()
        run: docker compose down -v

  # Lighthouse CI (#671): runs against the web container the stack boots and
  # enforces lenient ratchet-FLOOR budgets (.lighthouserc.json) on LCP/CLS, SEO
  # (#513/#514) and a11y (#66/#266) — turning one-off perf/SEO/a11y tickets into
  # an enforced budget. PRs only; separate job. The reports upload to Lighthouse
  # temporary public storage (a link is printed in the log); no secret required.
  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
      - uses: ./.github/actions/boot-stack
      - name: Run Lighthouse CI
        # Version-pinned lhci (no extra pinned action to maintain). collect →
        # assert (budgets) → upload to temporary-public-storage.
        run: npx --yes @lhci/cli@0.15.1 autorun
      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-results
          path: .lighthouseci/
          if-no-files-found: ignore
      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=120
      - name: Tear down
        if: always()
        run: docker compose down -v
