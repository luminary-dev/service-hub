name: CI

on:
  pull_request:
    branches: [dev, prod]
  push:
    branches: [dev, prod]

permissions:
  contents: read

# Dummy values so module init and `next build` don't need real secrets.
# Nothing here connects to a real database or is used at runtime.
env:
  DATABASE_URL: "postgresql://user:password@localhost:5432/db?schema=public"
  AUTH_SECRET: "ci-dummy-secret"
  GATEWAY_URL: "http://localhost:4000"

jobs:
  web:
    name: web / ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck, lint, test, build]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ${{ matrix.check }}

  services:
    name: ${{ matrix.package }} / ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - api-gateway
        check: [typecheck, test, build]
    defaults:
      run:
        working-directory: services/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/${{ matrix.package }}/package-lock.json
      - run: npm ci
      - run: npm run ${{ matrix.check }}

  # Coverage (#262): collect per-package coverage for visibility + a ratchet.
  # `npm run coverage` enforces the low baseline thresholds in each package's
  # vitest config — they pass today, so this never fails the build now; it only
  # trips if coverage regresses below the floor. Separate from the fast matrix.
  coverage:
    name: coverage / ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - web
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - api-gateway
    defaults:
      run:
        working-directory: ${{ matrix.package == 'web' && '.' || format('services/{0}', matrix.package) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.package == 'web' && 'package-lock.json' || format('services/{0}/package-lock.json', matrix.package) }}
      - run: npm ci
      - name: Collect coverage
        run: npm run coverage
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage — ${{ matrix.package }}" >> "$GITHUB_STEP_SUMMARY"
            node -e "const t=require('./coverage/coverage-summary.json').total;for(const k of ['lines','statements','functions','branches'])console.log('- '+k+': '+t[k].pct+'% ('+t[k].covered+'/'+t[k].total+')')" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.package }}
          path: ${{ matrix.package == 'web' && 'coverage' || format('services/{0}/coverage', matrix.package) }}
          if-no-files-found: ignore

  # Integration / e2e (#241): boot the whole compose stack and run the
  # cross-service smoke script against it. PRs only (booting + building the full
  # stack is heavy) and a separate job, so it never blocks the fast per-package
  # matrix above.
  e2e:
    name: e2e / compose smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Boot the stack
        run: docker compose up -d --build --wait --wait-timeout 300
      - name: Wait for web
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/ >/dev/null 2>&1; then echo "web ready"; exit 0; fi
            sleep 2
          done
          echo "web did not become ready"; docker compose ps; exit 1
      - name: Seed databases
        # The prod images run with NODE_ENV=production, where the seed script
        # refuses to create demo data unless explicitly overridden. Opt in here.
        run: |
          for s in identity-service provider-service review-service job-service; do
            docker compose exec -T -e SEED_DEMO_DATA=true "$s" npm run db:seed
          done
      - name: Run e2e smoke
        env:
          INTERNAL_API_SECRET: dev-internal-secret
        run: ./scripts/e2e-smoke.sh
      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=120
      - name: Tear down
        if: always()
        run: docker compose down -v
