name: CI

on:
  pull_request:
    branches: [dev, prod]
  push:
    branches: [dev, prod]

# Cancel superseded runs: only the latest commit of a PR/branch needs to be
# green. Each ref gets its own group, so post-merge dev/prod runs never cancel
# one another.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Dummy values so module init and `next build` don't need real secrets.
# Nothing here connects to a real database or is used at runtime.
env:
  DATABASE_URL: "postgresql://user:password@localhost:5432/db?schema=public"
  AUTH_SECRET: "ci-dummy-secret"
  GATEWAY_URL: "http://localhost:4000"

jobs:
  web:
    name: web / ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck, lint, test, build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ${{ matrix.check }}

  services:
    name: ${{ matrix.package }} / ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - api-gateway
        check: [typecheck, test, build]
    defaults:
      run:
        working-directory: services/${{ matrix.package }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/${{ matrix.package }}/package-lock.json
      - run: npm ci
      - run: npm run ${{ matrix.check }}

  # Prod compose validation (#512): the fast per-package matrix and the e2e
  # smoke both exercise the *dev* `docker-compose.yml`; the file that actually
  # ships — `docker-compose.prod.yml` — was only ever parsed at deploy time over
  # SSH, so a syntax error, bad anchor, broken `${VAR:?}`, wrong image name, or
  # malformed healthcheck/mem_limit surfaced only during a live deploy (and the
  # two files had already drifted). `docker compose config` fully
  # parses/interpolates the file without pulling images or starting anything, so
  # it's a cheap gate. Dummy values satisfy the required `${VAR:?}` guards so
  # interpolation succeeds; the step fails loudly if the file is invalid.
  prod-compose:
    name: compose-config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate docker-compose.prod.yml
        # Dummies only satisfy interpolation — nothing connects or is pulled.
        # ACME_EMAIL stays deliberately unset to exercise its compose default
        # (admin@${DOMAIN}, #387).
        env:
          AUTH_SECRET: ci-dummy-secret
          INTERNAL_API_SECRET: ci-dummy-secret
          POSTGRES_PASSWORD: ci-dummy-password
          IDENTITY_DB_PASSWORD: ci-dummy-password
          PROVIDER_DB_PASSWORD: ci-dummy-password
          REVIEW_DB_PASSWORD: ci-dummy-password
          JOB_DB_PASSWORD: ci-dummy-password
          REDIS_PASSWORD: ci-dummy-password
          WEB_ORIGIN: https://ci.example.test
          DOMAIN: ci.example.test
        run: docker compose -f docker-compose.prod.yml config -q
      - name: Validate deploy/Caddyfile
        # `caddy validate` catches a Caddyfile that would crash-loop the only
        # public entrypoint at deploy time (#387). ACME_EMAIL mirrors the
        # compose default used when the secret is unset (an EMPTY value is the
        # known failure mode this guards against — the compose default makes it
        # unreachable, and this proves the defaulted config actually loads).
        # Same digest-pinned image as docker-compose.prod.yml.
        run: |
          docker run --rm \
            -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -e DOMAIN=ci.example.test -e ACME_EMAIL=admin@ci.example.test \
            caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648 \
            caddy validate --config /etc/caddy/Caddyfile

  # Coverage (#262): collect per-package coverage for visibility + a ratchet.
  # `npm run coverage` enforces the low baseline thresholds in each package's
  # vitest config — they pass today, so this never fails the build now; it only
  # trips if coverage regresses below the floor. Separate from the fast matrix.
  coverage:
    name: ${{ matrix.package }} / coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - web
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - api-gateway
    defaults:
      run:
        working-directory: ${{ matrix.package == 'web' && '.' || format('services/{0}', matrix.package) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.package == 'web' && 'package-lock.json' || format('services/{0}/package-lock.json', matrix.package) }}
      - run: npm ci
      - name: Collect coverage
        run: npm run coverage
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage — ${{ matrix.package }}" >> "$GITHUB_STEP_SUMMARY"
            node -e "const t=require('./coverage/coverage-summary.json').total;for(const k of ['lines','statements','functions','branches'])console.log('- '+k+': '+t[k].pct+'% ('+t[k].covered+'/'+t[k].total+')')" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.package }}
          path: ${{ matrix.package == 'web' && 'coverage' || format('services/{0}/coverage', matrix.package) }}
          if-no-files-found: ignore

  # Integration / e2e (#241): boot the whole compose stack and run the
  # cross-service smoke script against it. PRs only (booting + building the full
  # stack is heavy) and a separate job, so it never blocks the fast per-package
  # matrix above.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build images (warm layer cache)
        # Pre-build the nine compose images with bake so the slowest required
        # gate reuses deploy.yml's per-image GHA layer cache instead of
        # cold-building every PR (#573). READ-ONLY like trivy-image in
        # security-scan.yml: deliberately no cache-to, so a feature branch can
        # never write the shared cache. `load` imports the images into the
        # daemon under the exact names compose expects (service-hub-<name>),
        # so the boot below runs with --no-build.
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          source: .
          files: docker-compose.yml
          load: true
          set: |
            web.tags=service-hub-web
            web.cache-from=type=gha,scope=web
            identity-service.tags=service-hub-identity-service
            identity-service.cache-from=type=gha,scope=identity-service
            provider-service.tags=service-hub-provider-service
            provider-service.cache-from=type=gha,scope=provider-service
            review-service.tags=service-hub-review-service
            review-service.cache-from=type=gha,scope=review-service
            job-service.tags=service-hub-job-service
            job-service.cache-from=type=gha,scope=job-service
            notification-service.tags=service-hub-notification-service
            notification-service.cache-from=type=gha,scope=notification-service
            media-service.tags=service-hub-media-service
            media-service.cache-from=type=gha,scope=media-service
            chat-service.tags=service-hub-chat-service
            chat-service.cache-from=type=gha,scope=chat-service
            api-gateway.tags=service-hub-api-gateway
            api-gateway.cache-from=type=gha,scope=api-gateway
      - name: Boot the stack
        run: docker compose up -d --no-build --wait --wait-timeout 300
      - name: Wait for web
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/ >/dev/null 2>&1; then echo "web ready"; exit 0; fi
            sleep 2
          done
          echo "web did not become ready"; docker compose ps; exit 1
      - name: Seed databases
        # The prod images run with NODE_ENV=production, where the seed script
        # refuses to create demo data unless explicitly overridden. Opt in here.
        run: |
          for s in identity-service provider-service review-service job-service notification-service; do
            docker compose exec -T -e SEED_DEMO_DATA=true "$s" npm run db:seed
          done
      - name: Run e2e smoke
        env:
          INTERNAL_API_SECRET: dev-internal-secret
        run: ./scripts/e2e-smoke.sh
      - name: Back up and restore-verify
        # Exercises the backup → restore-verification path (#389) against the
        # seeded stack: dump all 5 DBs, restore them into a scratch container,
        # row-count the main tables — so a broken dump/restore script fails CI
        # instead of a real disaster recovery. (No BACKUP_R2_* here, so the
        # offsite leg is skipped with a warning.)
        run: |
          COMPOSE_FILE=docker-compose.yml ./scripts/backup-dbs.sh
          ./scripts/verify-backup.sh
      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=120
      - name: Tear down
        if: always()
        run: docker compose down -v
