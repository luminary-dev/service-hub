name: Sync issues & PRs to project board

# Syncs every newly opened issue AND pull request onto the org-wide Service Hub
# board (https://github.com/orgs/luminary-dev/projects/1) with Status=Backlog
# and the Service field set for this repo, and assigns the item to whoever
# opened it — the board's built-in Assignees field mirrors the issue/PR
# assignees, so the creator shows up as the assignee on the board too.
# Adding is idempotent (an item can only appear on the board once), and the
# built-in auto-add workflow must stay OFF to keep a single sync path.
on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-to-board:
    runs-on: ubuntu-latest
    steps:
      - name: Assign the creator
        # The opener becomes the assignee (self-assignment is allowed). The
        # project board's Assignees field follows this automatically.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr edit "${{ github.event.pull_request.number }}" --repo "$REPO" --add-assignee "$ACTOR" || true
          else
            gh issue edit "${{ github.event.issue.number }}" --repo "$REPO" --add-assignee "$ACTOR" || true
          fi

      - name: Add to board
        id: add
        uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/orgs/luminary-dev/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}

      - name: Set Status=Backlog and Service
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          ITEM_ID: ${{ steps.add.outputs.itemId }}
        run: |
          gh api graphql -f item="$ITEM_ID" -f query='
            mutation($item: ID!) {
              status: updateProjectV2ItemFieldValue(input: {
                projectId: "PVT_kwDOD0HlNc4Bcax8", itemId: $item,
                fieldId: "PVTSSF_lADOD0HlNc4Bcax8zhXDxPc",
                value: { singleSelectOptionId: "c261ff04" }
              }) { clientMutationId }
              service: updateProjectV2ItemFieldValue(input: {
                projectId: "PVT_kwDOD0HlNc4Bcax8", itemId: $item,
                fieldId: "PVTSSF_lADOD0HlNc4Bcax8zhXDxSs",
                value: { singleSelectOptionId: "fa10f78e" }
              }) { clientMutationId }
            }'
