name: Security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Catch newly-disclosed advisories on existing deps even without commits.
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy dependency scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab (free on public repos)
    steps:
      - uses: actions/checkout@v7

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin"

      - name: Scan dependencies (lockfile)
        # Report-only: never fails the build. Findings surface in the Security tab.
        run: |
          "$RUNNER_TEMP/bin/trivy" fs \
            --scanners vuln \
            --severity CRITICAL,HIGH,MEDIUM \
            --format sarif \
            --output trivy-results.sarif \
            .

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      # Informational: surfaces advisories in the run log without blocking merges.
      - name: npm audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
