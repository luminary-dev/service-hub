name: Security scan

on:
  push:
    branches: [dev, prod]
  pull_request:
    branches: [dev, prod]
  schedule:
    # Catch newly-disclosed advisories on existing deps even without commits.
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

# Cancel superseded runs: only the latest commit of a PR/branch needs to be
# green. Each ref gets its own group, so post-merge dev/prod runs never cancel
# one another.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy dependency scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab (free on public repos)
    steps:
      - uses: actions/checkout@v7

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin"

      - name: Scan dependencies (lockfile)
        # Report-only: never fails the build. Findings surface in the Security tab.
        run: |
          "$RUNNER_TEMP/bin/trivy" fs \
            --scanners vuln \
            --severity CRITICAL,HIGH,MEDIUM \
            --format sarif \
            --output trivy-results.sarif \
            .

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  trivy-image:
    name: Trivy image scan / ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - web
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - api-gateway
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build image
        # Reuse the warm buildx layer cache that deploy.yml populates
        # (type=gha,scope=<image>) instead of cold-building ~9 Node/Prisma images
        # from scratch on every PR. READ-ONLY: there is deliberately no cache-to
        # here — this job runs on PRs, and letting a feature branch write the
        # shared cache could poison prod's build. deploy.yml stays the sole cache
        # writer. `load: true` imports the built image into the local Docker
        # daemon so Trivy can scan it by tag below.
        uses: docker/build-push-action@v7
        with:
          # web builds from the repo root; each service from its own directory.
          context: ${{ matrix.image == 'web' && '.' || format('services/{0}', matrix.image) }}
          load: true
          tags: scan/${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin"

      - name: Scan image (base-image / OS packages)
        # --pkg-types os: npm packages are already covered by the lockfile scan
        # above; this job exists for the node:22-alpine layer (musl, openssl,
        # busybox, ...). Gating (#238): fail the build on HIGH/CRITICAL OS-package
        # vulns that have a fix available (--ignore-unfixed keeps the gate
        # actionable — no failing on advisories we can't remediate). The SARIF is
        # still written and uploaded (the upload step runs on always()), so all
        # findings continue to surface in the Security tab.
        run: |
          "$RUNNER_TEMP/bin/trivy" image \
            --scanners vuln \
            --pkg-types os \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format sarif \
            --output trivy-image.sarif \
            "scan/${{ matrix.image }}:ci"

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image-${{ matrix.image }}

  npm-audit:
    name: npm audit / ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - web
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - api-gateway
    defaults:
      run:
        working-directory: ${{ matrix.package == 'web' && '.' || format('services/{0}', matrix.package) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # Informational: surfaces advisories in the run log without blocking merges.
      - name: npm audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
