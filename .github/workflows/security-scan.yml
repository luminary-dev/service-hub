name: Security scan

on:
  push:
    branches: [dev, prod]
  pull_request:
    branches: [dev, prod]
  schedule:
    # Catch newly-disclosed advisories on existing deps even without commits.
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

# Cancel superseded runs: only the latest commit of a PR/branch needs to be
# green. Each ref gets its own group, so post-merge dev/prod runs never cancel
# one another.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trivy:
    name: trivy-fs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab (free on public repos)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Scan dependencies (lockfile)
        # Report-only: exit-code stays 0 (the default), so this never fails the
        # build — findings surface in the Security tab. Pinned via trivy-action
        # (was piped from the moving `main` install script, #386).
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-results.sarif

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  trivy-image:
    name: ${{ matrix.image }} / trivy-image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - web
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - search-service
          - trust-safety-service
          - api-gateway
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build image
        # Reuse the warm buildx layer cache that deploy.yml populates
        # (type=gha,scope=<image>) instead of cold-building ~9 Node/Prisma images
        # from scratch on every PR. READ-ONLY: there is deliberately no cache-to
        # here — this job runs on PRs, and letting a feature branch write the
        # shared cache could poison prod's build. deploy.yml stays the sole cache
        # writer. `load: true` imports the built image into the local Docker
        # daemon so Trivy can scan it by tag below.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          # web builds from the repo root; each service from its own directory.
          context: ${{ matrix.image == 'web' && '.' || format('services/{0}', matrix.image) }}
          load: true
          tags: scan/${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}

      - name: Scan image (base-image / OS packages)
        # vuln-type os: npm packages are already covered by the lockfile scan
        # above; this job exists for the node:26-alpine layer (musl, openssl,
        # busybox, ...). Gating (#238): fail the build on HIGH/CRITICAL OS-package
        # vulns that have a fix available (ignore-unfixed keeps the gate
        # actionable — no failing on advisories we can't remediate). The SARIF is
        # still written and uploaded (the upload step runs on always()), so all
        # findings continue to surface in the Security tab. Pinned via
        # trivy-action (#386); vuln-type is that action's input for --pkg-types.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: scan/${{ matrix.image }}:ci
          scanners: vuln
          vuln-type: os
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-image.sarif

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image-${{ matrix.image }}

  npm-audit:
    name: ${{ matrix.package }} / npm-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - web
          - identity-service
          - provider-service
          - review-service
          - job-service
          - notification-service
          - media-service
          - chat-service
          - search-service
          - trust-safety-service
          - api-gateway
    defaults:
      run:
        working-directory: ${{ matrix.package == 'web' && '.' || format('services/{0}', matrix.package) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
      # Gates on CRITICAL (#386): `--audit-level=critical` only sets a non-zero
      # exit code when a CRITICAL advisory is present, so a critical production
      # dependency vuln now blocks the build. `npm audit` still prints the full
      # report (HIGH/moderate/low included), so lower-severity advisories stay
      # visible in the run log without failing it. No `continue-on-error` here.
      - name: npm audit (production dependencies)
        run: npm audit --omit=dev --audit-level=critical

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # fetch-depth: 0 so gitleaks can walk the full history on push events and
      # the PR commit range on pull_request events (a shallow clone would only
      # see the tip commit and miss a secret introduced earlier in the branch).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      # Secret scanning: Trivy/npm-audit cover dependency + OS CVEs but do NOT
      # scan the tree for committed secrets. This repo is PUBLIC and the deploy
      # renders the server `.env` from GitHub secrets, so a single leaked
      # AUTH_SECRET / INTERNAL_API_SECRET / DB password is game-over (#669).
      # gitleaks-action is free for public repos; GITLEAKS_LICENSE is only
      # required to scan PRIVATE org repos, so no license secret is wired here.
      # Config lives in `.gitleaks.toml` (extends the default ruleset + a small
      # allowlist for the repo's intentional dummy fixtures). The action exits
      # non-zero on a finding, so a leak GATES the build.
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
