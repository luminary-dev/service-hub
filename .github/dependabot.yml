version: 2
updates:
  # Application dependencies. Security fixes are always opened as individual
  # PRs regardless of the grouping below; grouping only tidies routine updates.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used in workflows patched too.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
