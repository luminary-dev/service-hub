version: 2
updates:
  # Application dependencies: the web app at the root plus every service
  # package. Security fixes are always opened as individual PRs regardless of
  # the grouping below; grouping only tidies routine updates.
  - package-ecosystem: npm
    directories:
      - "/"
      - "/services/*"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # eslint 10 removed deprecated context APIs that the eslint-plugin-react
      # inside eslint-config-next still uses (see PR #103). Unblock when
      # eslint-config-next ships eslint-10 support.
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used in workflows patched too — the root workflows
  # and each service's own workflow (active in its mirror repo).
  - package-ecosystem: github-actions
    directories:
      - "/"
      - "/services/*"
    schedule:
      interval: weekly

  # Track container base images (#238) so base-layer CVEs generate update PRs
  # instead of silently persisting. Covers Dockerfiles ONLY: the root web
  # Dockerfile at "/", every service Dockerfile under "/services/*", and the
  # custom edge Caddy image at "/deploy/caddy" (#670 — xcaddy builder + alpine
  # runtime). Base images are pinned by digest with a `# dependabot: <tag>`
  # comment; Dependabot bumps the digest and keeps the readable tag current.
  #
  # NOTE (#664): the `docker` ecosystem parses `FROM` refs in Dockerfiles only —
  # it does NOT read `image:` refs in docker-compose*.yml. The postgis/redis/
  # crowdsec digests pinned in docker-compose.prod.yml are therefore tracked out
  # of band by the `.github/workflows/compose-image-digests.yml` workflow.
  - package-ecosystem: docker
    directories:
      - "/"
      - "/services/*"
      - "/deploy/caddy"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
